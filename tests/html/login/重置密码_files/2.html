<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-user-resetPwd" novalidate="novalidate">
			<input name="userId" type="hidden" value="2">
			<div class="form-group">
				<label class="col-sm-3 control-label">登录名称：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" readonly="true" name="loginName" value="ry">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">输入密码：</label>
				<div class="col-sm-8">
					<div class="input-group">
                        <input class="form-control valid" type="password" name="password" id="password" placeholder="请输入重置密码" value="123456" aria-invalid="false">
                        <span class="input-group-addon" title="重置密码,鼠标按下显示密码" onmousedown="$(&#39;#password&#39;).attr(&#39;type&#39;,&#39;text&#39;)" onmouseup="$(&#39;#password&#39;).attr(&#39;type&#39;,&#39;password&#39;)"><i class="fa fa-key"></i></span>
                    </div>
				</div>
			</div>
		</form>
	</div>
	
    <script> var ctx = "\/"; var lockscreen = null; if(lockscreen){window.top.location=ctx+"lockscreen";} </script>

	<script type="text/javascript">
		$("#form-user-resetPwd").validate({
			rules:{
				password:{
					required: true,
					minlength: 5,
					maxlength: 20,
					specialSign: true
				},
			},
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	        	$.operate.save(ctx + "system/user/resetPwd", $('#form-user-resetPwd').serialize());
	        }
	    }
	</script>
