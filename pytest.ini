
[pytest]
# 测试路径
testpaths = testcases/ui

# 测试文件命名规则
python_files = test_*.py

# 测试类命名规则
python_classes = Test*

# 测试函数命名规则
python_functions = test_*

# 添加标记
markers =
    ui: UI测试
# 测试报告
addopts = 
    -v -s
    --alluredir=./allure-results
    --clean-alluredir
    ; --strict-markers
    ; --html=reports/test_report.html
    ; --self-contained-html